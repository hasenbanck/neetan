; neetan - PC-98 emulator configuration
;
; Load with: neetan --config default_config.conf
; Lines starting with ; or # are comments.
; Format: key = value

; ---------------------------------------------------------------------------
; Machine
; ---------------------------------------------------------------------------

; Machine type: PC9801VM (PC-9801VM, V30 8/10MHz), PC9801VX (PC-9801VX, 80286),
;               PC9801RA (PC-9801RA, 80386)
; machine = PC9801VX

; ---------------------------------------------------------------------------
; Disk images
; ---------------------------------------------------------------------------

; Floppy disk images for drive 1 and 2 (repeatable for multi-disk games).
; Supported formats: D88 (.d88/.d98/.88d/.98d), HDM (.hdm), NFD (.nfd)
; fdd1 = path/to/disk.d88
; fdd2 = path/to/disk2.d88

; Hard disk images for SASI drive 1 and 2.
; Supported formats: HDI (.hdi), NHD (.nhd), THD (.thd)
; hdd1 = path/to/hdd.hdi
; hdd2 = path/to/hdd2.hdi

; CD-ROM disc image (repeatable, PC-9821 only).
; Supported formats: CUE/BIN (.cue)
; cdrom = path/to/game.cue

; ---------------------------------------------------------------------------
; Display
; ---------------------------------------------------------------------------

; Display aspect mode: 4:3 or 1:1
; aspect-mode = 4:3

; Force 2.5 MHz GDC clock (200-line compatibility mode).
; VX and later machines default to 5 MHz. VM always uses 2.5 MHz.
; gdc-compatibility = off

; ---------------------------------------------------------------------------
; Audio
; ---------------------------------------------------------------------------

; Audio volume (0.0 to 1.0)
; audio-volume = 1.0

; ---------------------------------------------------------------------------
; ROMs
; ---------------------------------------------------------------------------

; Path to BIOS ROM file. If not set, runs in HLE BIOS mode.
; bios-rom = roms/bios.rom

; Path to font ROM file. If not set, uses built-in font ROM.
; font-rom = roms/font.rom

; ---------------------------------------------------------------------------
; Sound board
; ---------------------------------------------------------------------------

; Sound board type: none, 26k (YM2203 OPN), 86 (YM2608 OPNA + PCM86),
;                   86+26k (both boards)
; soundboard = 86+26k

; ---------------------------------------------------------------------------
; Printer
; ---------------------------------------------------------------------------

; Output file for printer (file must already exist).
; printer = /tmp/printer.txt

; ---------------------------------------------------------------------------
; SC-55 sound module (requires "sc55" feature, enabled by default)
; ---------------------------------------------------------------------------

; Path to directory containing Roland SC-55 ROM files.
; Enables MIDI output through the MPU-401 interface.
; sc55-roms = path/to/sc55_roms

; ---------------------------------------------------------------------------
; Key bindings
; ---------------------------------------------------------------------------
;
; Format: key.<HostKey> = <PC-98 Key>
;
; Override individual keys. Only the keys you list here are changed;
; everything else keeps its default mapping shown below.
;
; Host key names (left side) match SDL physical scancodes:
;   Escape, 1-9, 0, Minus, Equals, Backslash, Backspace, Tab,
;   A-Z, Return, LeftBracket, RightBracket, Grave, Semicolon, Apostrophe,
;   NonUsBackslash, Comma, Period, Slash, Space,
;   PageUp, PageDown, Insert, Delete, Up, Left, Right, Down, Home, End,
;   KpMinus, KpDivide, Kp0-Kp9, KpMultiply, KpPlus, KpEnter, KpComma,
;   KpPeriod, F1-F15, PrintScreen, Pause, NumLock, Application,
;   LShift, RShift, CapsLock, LAlt, RAlt, LCtrl, RCtrl
;
; PC-98 key names (right side):
;   Esc, 1-9, 0, Minus, Caret, Yen, Bs, Tab,
;   A-Z, Return, At, LeftBracket, RightBracket, Semicolon, Colon,
;   Comma, Period, Slash, Underscore, Space,
;   Xfer, Nfer, RollUp, RollDown, Ins, Del,
;   Up, Left, Right, Down, Home, Help,
;   KpMinus, KpDivide, Kp0-Kp9, KpMultiply, KpPlus, KpEquals, KpComma,
;   KpPeriod, F1-F10, Vf1-Vf5, Stop, Copy,
;   Shift, Caps, Kana, Grph, Ctrl
;
; Examples:
;   key.RAlt = Grph          ; Use RAlt as GRPH instead of XFER
;   key.PageUp = RollDown    ; MAME-style functional PgUp/PgDn mapping
;   key.PageDown = RollUp

