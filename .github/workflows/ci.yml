name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  SLANG_VERSION: "2026.4.2"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  check:
    name: Check (${{ matrix.name }})
    needs: fmt
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            slang_asset: slang-2026.4.2-linux-x86_64.tar.gz
          - name: Windows x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            slang_asset: slang-2026.4.2-windows-x86_64.zip
          - name: macOS aarch64 (15)
            runner: macos-15
            target: aarch64-apple-darwin
            slang_asset: slang-2026.4.2-macos-aarch64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold cmake \
            libasound2-dev libpulse-dev libjack-dev libpipewire-0.3-dev libsndio-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libwayland-dev libdecor-0-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev
          VK_VERSION=$(curl -s https://vulkan.lunarg.com/sdk/latest/linux.txt)
          curl -fsSL -o "$RUNNER_TEMP/vulkan_sdk.tar.xz" \
            "https://sdk.lunarg.com/sdk/download/$VK_VERSION/linux/vulkan_sdk.tar.xz"
          mkdir -p "$HOME/VulkanSDK"
          tar xJf "$RUNNER_TEMP/vulkan_sdk.tar.xz" -C "$HOME/VulkanSDK"
          echo "VULKAN_SDK=$HOME/VulkanSDK/$VK_VERSION/x86_64" >> "$GITHUB_ENV"
          echo "$HOME/VulkanSDK/$VK_VERSION/x86_64/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          VK_VERSION=$(curl -s https://vulkan.lunarg.com/sdk/latest/mac.txt)
          curl -fsSL -o "$RUNNER_TEMP/vulkan_sdk.zip" \
            "https://sdk.lunarg.com/sdk/download/$VK_VERSION/mac/vulkan_sdk.zip"
          unzip -q "$RUNNER_TEMP/vulkan_sdk.zip" -d "$RUNNER_TEMP/vulkan_sdk"
          sudo "$RUNNER_TEMP/vulkan_sdk/vulkansdk-macOS-$VK_VERSION.app/Contents/MacOS/vulkansdk-macOS-$VK_VERSION" \
            --root "$HOME/VulkanSDK/$VK_VERSION" --accept-licenses --default-answer --confirm-command install \
            copy_only=1
          echo "VULKAN_SDK=$HOME/VulkanSDK/$VK_VERSION/macOS" >> "$GITHUB_ENV"
          echo "$HOME/VulkanSDK/$VK_VERSION/macOS/bin" >> "$GITHUB_PATH"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$HOME/VulkanSDK/$VK_VERSION/macOS/lib" >> "$GITHUB_ENV"

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod -Uri "https://vulkan.lunarg.com/sdk/latest/windows.txt").Trim()
          $installer = "$env:RUNNER_TEMP\vulkan_sdk.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkan_sdk.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      - name: Verify Vulkan SDK
        shell: bash
        run: echo "VULKAN_SDK=$VULKAN_SDK"

      - name: Install slangc (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "$RUNNER_TEMP/slang"
          curl -fsSL "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/${{ matrix.slang_asset }}" \
            | tar xz -C "$RUNNER_TEMP/slang"
          echo "$RUNNER_TEMP/slang/bin" >> "$GITHUB_PATH"

      - name: Install slangc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/shader-slang/slang/releases/download/v$env:SLANG_VERSION/${{ matrix.slang_asset }}"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\slang.zip"
          Expand-Archive "$env:RUNNER_TEMP\slang.zip" -DestinationPath "$env:RUNNER_TEMP\slang"
          echo "$env:RUNNER_TEMP\slang\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify slangc
        shell: bash
        run: slangc -version

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features sdl3-build-from-source -- -D warnings

      - name: Test
        run: cargo test --workspace --features sdl3-build-from-source
